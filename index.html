<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f172a" />
  <title>Tuulastelu</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --calm: #34d399;
      --moderate: #fbbf24;
      --strong: #f97316;
      --storm: #f87171;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

    /* HEADER */
    .header {
      padding: 16px 20px 10px;
      background: var(--bg);
      flex-shrink: 0;
      z-index: 20;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }

    .refresh-btn {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .refresh-btn:active { background: var(--surface2); color: var(--accent); }

    .location-row { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    .location-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .location-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }

    /* NOW CARD */
    .now-card {
      margin: 4px 16px 12px;
      background: linear-gradient(135deg, #0c4a6e 0%, #075985 100%);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
    }

    .now-compass { position: relative; width: 64px; height: 64px; flex-shrink: 0; }

    .compass-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .compass-labels { position: absolute; inset: 0; pointer-events: none; }
    .compass-label { position: absolute; font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.5); }
    .compass-label.n { top: 2px; left: 50%; transform: translateX(-50%); }
    .compass-label.s { bottom: 2px; left: 50%; transform: translateX(-50%); }
    .compass-label.e { right: 2px; top: 50%; transform: translateY(-50%); }
    .compass-label.w { left: 2px; top: 50%; transform: translateY(-50%); }

    .now-info { flex: 1; }
    .now-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
    .now-speed { font-size: 38px; font-weight: 800; line-height: 1; color: #fff; letter-spacing: -1px; }
    .now-unit { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.7); margin-left: 2px; }
    .now-details { margin-top: 5px; display: flex; gap: 14px; }
    .now-detail { font-size: 12px; color: rgba(255,255,255,0.65); }
    .now-detail strong { color: rgba(255,255,255,0.9); }

    /* TABS */
    .tabs {
      display: flex;
      margin: 0 16px 10px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 4px; gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      flex: 1; padding: 8px; text-align: center;
      font-size: 14px; font-weight: 500;
      border-radius: 8px; cursor: pointer;
      border: none; background: transparent; color: var(--muted);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: var(--surface2); color: var(--text); }

    /* CONTENT */
    .content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* HOUR LIST */
    .hours-wrap { flex: 1; overflow-y: auto; padding: 0 16px 32px; -webkit-overflow-scrolling: touch; }
    .hours-wrap::-webkit-scrollbar { width: 0; }

    .hour-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      margin-bottom: 5px; background: var(--surface);
    }
    .hour-row.is-now { background: var(--surface2); outline: 1.5px solid var(--accent2); }
    .hour-time { font-size: 15px; font-weight: 600; width: 44px; flex-shrink: 0; }
    .hour-row.is-now .hour-time { color: var(--accent); }
    .hour-arrow-wrap { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hour-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .hour-bar-row { display: flex; align-items: center; gap: 8px; }
    .hour-bar { height: 5px; border-radius: 3px; flex-shrink: 0; }
    .hour-bar-label { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .hour-speed { font-size: 17px; font-weight: 700; width: 44px; text-align: right; flex-shrink: 0; }
    .hour-unit { font-size: 11px; color: var(--muted); width: 20px; flex-shrink: 0; }
    .hour-dir-text { font-size: 11px; color: var(--muted); width: 24px; text-align: center; flex-shrink: 0; }

    /* MAP */
    .map-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    #leafletMap { flex: 1; }

    .map-loading {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(15,23,42,0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      z-index: 1000;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .map-loading.hidden { opacity: 0; }
    .map-loading-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* MAP TIME BAR */
    .map-time-bar { background: var(--bg); padding: 8px 0 10px; flex-shrink: 0; }

    .map-day-tabs { display: flex; gap: 6px; padding: 0 16px; margin-bottom: 6px; }
    .map-day-tab {
      padding: 4px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--muted);
      -webkit-tap-highlight-color: transparent;
    }
    .map-day-tab.active { background: var(--surface2); border-color: var(--accent2); color: var(--text); }

    .map-time-scroll { overflow-x: auto; white-space: nowrap; padding: 0 16px; -webkit-overflow-scrolling: touch; }
    .map-time-scroll::-webkit-scrollbar { height: 0; }

    .map-time-chip {
      display: inline-flex; flex-direction: column; align-items: center;
      padding: 5px 8px; margin-right: 5px;
      border-radius: 8px; background: var(--surface);
      border: 1.5px solid transparent;
      cursor: pointer; min-width: 46px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .map-time-chip.active { background: var(--surface2); border-color: var(--accent2); }
    .map-time-chip-hour { font-size: 12px; font-weight: 600; color: var(--text); }
    .map-time-chip-speed { font-size: 10px; font-weight: 500; margin-top: 1px; }

    .map-time-date-sep {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 600;
      color: var(--accent); letter-spacing: 0.5px;
      padding: 0 8px 0 4px; white-space: nowrap;
      vertical-align: middle;
    }

    .date-sep {
      font-size: 11px; font-weight: 600;
      color: var(--accent);
      padding: 14px 2px 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* WIND MARKER */
    .wm { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .wm-arrow {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      background: rgba(15,23,42,0.88);
      border-radius: 50%; border: 2px solid;
      backdrop-filter: blur(3px);
    }
    .wm-speed {
      font-size: 10px; font-weight: 700;
      background: rgba(15,23,42,0.88);
      padding: 1px 5px; border-radius: 4px; white-space: nowrap;
    }
    .wm-user {
      width: 16px; height: 16px;
      background: var(--accent); border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 0 4px rgba(56,189,248,0.3);
    }

    /* STATES */
    .state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; flex: 1; padding: 40px 24px;
      color: var(--muted); text-align: center;
    }
    .state-icon { font-size: 40px; }
    .state-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .state-msg { font-size: 13px; line-height: 1.5; }
    .state-btn {
      margin-top: 8px; padding: 11px 24px;
      background: var(--accent2); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Leaflet overrides */
    .leaflet-control-attribution { font-size: 9px !important; background: rgba(15,23,42,0.7) !important; color: #64748b !important; }
    .leaflet-control-attribution a { color: #64748b !important; }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border-radius: 12px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; border: 1px solid var(--border) !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 12px 14px !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .popup-speed { font-size: 22px; font-weight: 800; }
    .popup-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .popup-row { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .popup-row strong { color: var(--text); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">Tuulastelu</span>
    <button class="refresh-btn" id="refreshBtn" aria-label="Päivitä">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
    </button>
  </div>
  <div class="location-row">
    <div class="location-dot"></div>
    <span class="location-name" id="locationName">Haetaan sijaintia...</span>
  </div>
</div>

<div id="mainContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
  <div class="state">
    <div class="spinner"></div>
    <div class="state-title">Ladataan</div>
    <div class="state-msg">Haetaan sijaintiasi ja tuulitietoja...</div>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const MAX_BAR          = 20;
const BASE_LAT_STEP    = 0.25;  // ~28 km (base grid resolution)
const BASE_LON_STEP    = 0.5;   // ~28 km at 60°N
const MAX_MARKERS      = 60;    // cap per viewport refresh

// Subsample factor by zoom: coarser zoom → every Nth base-grid point
function getSubsampleFactor(zoom) {
  if (zoom >= 10) return 1;   // ~28 km
  if (zoom >= 8)  return 2;   // ~55 km
  if (zoom >= 6)  return 4;   // ~110 km
  return 8;                   // ~220 km
}

// ─── App state ───────────────────────────────────────────────────────────────
let allData    = null;
let userLat    = null, userLon = null;

// Map state
let leafletMap    = null;
let userMarker    = null;
let windCache     = new Map();   // cellKey → hourly API object
let activeMarkers = new Map();   // cellKey → L.marker
let mapHourIdx    = null;        // absolute index into allData.hourly (null = current hour)
let movePending   = null;
let fetchPending  = false;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function windColorHex(s) {
  return s < 5 ? '#34d399' : s < 10 ? '#fbbf24' : s < 15 ? '#f97316' : '#f87171';
}
function windColorVar(s) {
  return s < 5 ? 'var(--calm)' : s < 10 ? 'var(--moderate)' : s < 15 ? 'var(--strong)' : 'var(--storm)';
}
function degToCompass(d) {
  return ['P','KO','I','KA','E','LO','L','LU'][Math.round(d / 45) % 8];
}
function degToFinnish(d) {
  return ['pohjoisesta','koillisesta','idästä','kaakosta',
          'etelästä','lounaasta','lännestä','luoteesta'][Math.round(d / 45) % 8];
}
function arrowSvg(deg, size, color) {
  const rot = (deg + 180) % 360;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none"
    style="transform:rotate(${rot}deg);display:block"
    stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="19" x2="12" y2="5"/>
    <polyline points="6 10 12 4 18 10"/>
  </svg>`;
}
function formatHour(iso) { return new Date(iso).getHours().toString().padStart(2,'0') + ':00'; }
function isNowHour(iso) {
  const d = new Date(iso), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() &&
    d.getDate()===n.getDate() && d.getHours()===n.getHours();
}
function dateStr(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── Grid helpers ─────────────────────────────────────────────────────────────
// Integer indices into the base grid — no floating-point drift
function latIdx(lat) { return Math.round(lat / BASE_LAT_STEP); }
function lonIdx(lon) { return Math.round(lon / BASE_LON_STEP); }
function idxToLat(ri) { return ri * BASE_LAT_STEP; }
function idxToLon(ci) { return ci * BASE_LON_STEP; }
function cellKey(ri, ci) { return `${ri}_${ci}`; }

// Returns grid cells covering `bounds` at the spacing appropriate for `zoom`.
// Cells are always multiples of the subsample factor so cache keys are
// consistent across zoom levels — zooming in just reveals more existing cache.
function getCellsForBounds(bounds, zoom) {
  const f  = getSubsampleFactor(zoom);
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
  const r0 = Math.floor(latIdx(sw.lat) / f) * f - f;
  const r1 = Math.ceil(latIdx(ne.lat)  / f) * f + f;
  const c0 = Math.floor(lonIdx(sw.lng) / f) * f - f;
  const c1 = Math.ceil(lonIdx(ne.lng)  / f) * f + f;
  const cells = [];
  for (let r = r0; r <= r1; r += f)
    for (let c = c0; c <= c1; c += f)
      cells.push({ ri: r, ci: c, key: cellKey(r, c), lat: idxToLat(r), lon: idxToLon(c) });
  return cells;
}

// ─── Hourly index lookup ──────────────────────────────────────────────────────
function getAbsIdx() {
  if (mapHourIdx === null) {
    const ni = allData.hourly.findIndex(h => isNowHour(h.time));
    return ni >= 0 ? ni : 0;
  }
  return Math.min(mapHourIdx, allData.hourly.length - 1);
}

// ─── Fetch ───────────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms&timezone=auto&forecast_days=2`;
  const r = await fetch(url); if (!r.ok) throw new Error('API');
  return r.json();
}

async function fetchWeatherBatch(points) {
  const lats = points.map(p => p.lat.toFixed(4)).join(',');
  const lons = points.map(p => p.lon.toFixed(4)).join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}` +
    `&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms&timezone=auto&forecast_days=2`;
  const r = await fetch(url); if (!r.ok) throw new Error('API');
  const d = await r.json();
  return Array.isArray(d) ? d : [d];
}

async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=fi`);
    const d = await r.json(), a = d.address;
    return a.city || a.town || a.village || a.municipality || a.county || `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
  } catch { return `${lat.toFixed(3)}, ${lon.toFixed(3)}`; }
}

// ─── Wind marker helpers ──────────────────────────────────────────────────────
function makeWindIcon(speed, dir, gusts) {
  const col = windColorHex(speed);
  return L.divIcon({
    className: '',
    html: `<div class="wm">
      <div class="wm-arrow" style="border-color:${col}">${arrowSvg(dir, 20, col)}</div>
      <div class="wm-speed" style="color:${col}">${speed.toFixed(1)}</div>
    </div>`,
    iconSize: [38, 52],
    iconAnchor: [19, 26],
  });
}

function makePopup(speed, dir, gusts) {
  const col = windColorHex(speed);
  return `<div class="popup-label">Tuulen nopeus</div>
    <div class="popup-speed" style="color:${col}">${speed.toFixed(1)}<span style="font-size:14px;font-weight:400;color:var(--muted)"> m/s</span></div>
    <div class="popup-row">Tuulee <strong>${degToFinnish(dir)}</strong> (${dir}°)</div>
    <div class="popup-row">Puuskat <strong>${gusts.toFixed(1)} m/s</strong></div>`;
}

// ─── Map update ───────────────────────────────────────────────────────────────
function setMapLoading(on) {
  const el = document.getElementById('mapLoading');
  if (el) el.classList.toggle('hidden', !on);
}

async function updateMapForBounds(bounds) {
  if (!leafletMap || !allData) return;
  if (fetchPending) return; // skip if a fetch is already running

  const zoom = leafletMap.getZoom();
  const center = bounds.getCenter();
  const allCells = getCellsForBounds(bounds, zoom);

  // Sort by distance from viewport center, cap at MAX_MARKERS
  allCells.sort((a, b) =>
    Math.hypot(a.lat - center.lat, a.lon - center.lng) -
    Math.hypot(b.lat - center.lat, b.lon - center.lng)
  );
  const visible = allCells.slice(0, MAX_MARKERS);
  const visibleKeys = new Set(visible.map(c => c.key));

  // Remove markers that left the viewport
  for (const [key, marker] of activeMarkers) {
    if (!visibleKeys.has(key)) { marker.remove(); activeMarkers.delete(key); }
  }

  // Fetch uncached cells
  const toFetch = visible.filter(c => !windCache.has(c.key));
  if (toFetch.length > 0) {
    fetchPending = true;
    setMapLoading(true);
    try {
      const results = await fetchWeatherBatch(toFetch);
      results.forEach((data, i) => windCache.set(toFetch[i].key, data.hourly));
    } catch (e) { /* silently ignore fetch errors on pan */ }
    fetchPending = false;
    setMapLoading(false);
  }

  // Add/update markers for visible cached cells
  const absIdx = getAbsIdx();
  for (const cell of visible) {
    const hourly = windCache.get(cell.key);
    if (!hourly) continue;
    const speed = hourly.wind_speed_10m[absIdx];
    const dir   = hourly.wind_direction_10m[absIdx];
    const gusts = hourly.wind_gusts_10m[absIdx];
    if (speed == null) continue;

    const existing = activeMarkers.get(cell.key);
    if (existing) {
      existing.setIcon(makeWindIcon(speed, dir, gusts));
      existing.setPopupContent(makePopup(speed, dir, gusts));
    } else {
      const marker = L.marker([cell.lat, cell.lon], { icon: makeWindIcon(speed, dir, gusts) })
        .bindPopup(makePopup(speed, dir, gusts))
        .addTo(leafletMap);
      activeMarkers.set(cell.key, marker);
    }
  }
}

// Update all existing markers when hour changes (no fetch needed)
function refreshMarkerIcons() {
  if (!leafletMap || !allData) return;
  const absIdx = getAbsIdx();
  for (const [key, marker] of activeMarkers) {
    const hourly = windCache.get(key);
    if (!hourly) continue;
    const speed = hourly.wind_speed_10m[absIdx];
    const dir   = hourly.wind_direction_10m[absIdx];
    const gusts = hourly.wind_gusts_10m[absIdx];
    if (speed == null) continue;
    marker.setIcon(makeWindIcon(speed, dir, gusts));
    marker.setPopupContent(makePopup(speed, dir, gusts));
  }
}

// ─── Map time chips ───────────────────────────────────────────────────────────
function renderMapTimeChips() {
  const scroll = document.getElementById('mapTimeScroll');
  if (!scroll || !allData) return;

  if (mapHourIdx === null) {
    const ni = allData.hourly.findIndex(h => isNowHour(h.time));
    mapHourIdx = ni >= 0 ? ni : 0;
  }

  const today = dateStr(0);
  scroll.innerHTML = allData.hourly.map((h, i) => {
    const col = windColorHex(h.windSpeed);
    const isFirstTomorrow = !h.time.startsWith(today) &&
      (i === 0 || allData.hourly[i - 1].time.startsWith(today));
    const sep = isFirstTomorrow
      ? `<span class="map-time-date-sep">Huomenna</span>` : '';
    return `${sep}<div class="map-time-chip${i === mapHourIdx ? ' active' : ''}" data-i="${i}">
      <span class="map-time-chip-hour">${formatHour(h.time)}</span>
      <span class="map-time-chip-speed" style="color:${col}">${h.windSpeed.toFixed(1)}</span>
    </div>`;
  }).join('');

  scroll.querySelectorAll('.map-time-chip').forEach(el => {
    el.addEventListener('click', () => {
      mapHourIdx = parseInt(el.dataset.i, 10);
      renderMapTimeChips();
      refreshMarkerIcons();
      el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
  });

  setTimeout(() => {
    const active = scroll.querySelector('.map-time-chip.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 60);
}

// ─── List view ────────────────────────────────────────────────────────────────
function renderListView() {
  const hours   = allData.hourly;
  const today   = dateStr(0);
  const nowHour = hours.find(h => isNowHour(h.time)) || hours[0];

  const rows = hours.map((h, i) => {
    const isNow = isNowHour(h.time);
    const col   = windColorVar(h.windSpeed);
    const barW  = Math.min(100, (h.windSpeed / MAX_BAR) * 100).toFixed(1);
    const gustW = Math.min(100, (h.gusts / MAX_BAR) * 100).toFixed(1);
    const isFirstTomorrow = !h.time.startsWith(today) &&
      (i === 0 || hours[i - 1].time.startsWith(today));
    const sep = isFirstTomorrow
      ? `<div class="date-sep">Huomenna</div>` : '';
    return `${sep}<div class="hour-row${isNow ? ' is-now' : ''}">
      <span class="hour-time">${formatHour(h.time)}</span>
      <div class="hour-arrow-wrap">${arrowSvg(h.windDir, 20, windColorHex(h.windSpeed))}</div>
      <div class="hour-bar-wrap">
        <div class="hour-bar-row">
          <div class="hour-bar" style="width:${barW}%;background:${col}"></div>
          <span class="hour-bar-label">${h.windSpeed.toFixed(1)} m/s</span>
        </div>
        <div class="hour-bar-row">
          <div class="hour-bar" style="width:${gustW}%;background:rgba(248,113,113,0.4)"></div>
          <span class="hour-bar-label" style="color:#f87171;opacity:0.75">puuska ${h.gusts.toFixed(1)}</span>
        </div>
      </div>
      <span class="hour-speed" style="color:${col}">${h.windSpeed.toFixed(1)}</span>
      <span class="hour-unit">m/s</span>
      <span class="hour-dir-text">${degToCompass(h.windDir)}</span>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="now-card">
      <div class="now-compass">
        <div class="compass-ring">
          <div class="compass-labels">
            <span class="compass-label n">P</span>
            <span class="compass-label s">E</span>
            <span class="compass-label e">I</span>
            <span class="compass-label w">L</span>
          </div>
          <div style="width:28px;height:28px">${arrowSvg(nowHour.windDir, 28, '#fff')}</div>
        </div>
      </div>
      <div class="now-info">
        <div class="now-label">Nyt</div>
        <div class="now-speed">${nowHour.windSpeed.toFixed(1)}<span class="now-unit">m/s</span></div>
        <div class="now-details">
          <span class="now-detail"><strong>${degToCompass(nowHour.windDir)}</strong> ${nowHour.windDir}°</span>
          <span class="now-detail">Puuskat <strong>${nowHour.gusts.toFixed(1)}</strong> m/s</span>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabList">Lista</button>
      <button class="tab" id="tabMap">Kartta</button>
    </div>
    <div class="content-area">
      <div class="hours-wrap" id="hoursList">${rows}</div>
    </div>`;

  document.getElementById('tabMap').onclick = renderMapView;

  setTimeout(() => {
    const el = document.querySelector('.hour-row.is-now');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 80);
}

// ─── Map view ─────────────────────────────────────────────────────────────────
function renderMapView() {
  document.getElementById('mainContent').innerHTML = `
    <div class="tabs">
      <button class="tab" id="tabList">Lista</button>
      <button class="tab active" id="tabMap">Kartta</button>
    </div>
    <div class="content-area">
      <div class="map-wrap">
        <div id="leafletMap"></div>
        <div class="map-loading hidden" id="mapLoading">
          <div class="map-loading-dot"></div>
          Haetaan tuulitietoja...
        </div>
        <div class="map-time-bar">
          <div class="map-time-scroll" id="mapTimeScroll"></div>
        </div>
      </div>
    </div>`;

  document.getElementById('tabList').onclick = renderListView;

  initLeafletMap();
  renderMapTimeChips();
}

function initLeafletMap() {
  // Clean up existing map if any
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  activeMarkers.clear();
  userMarker = null;

  leafletMap = L.map('leafletMap', {
    center: [userLat, userLon],
    zoom: 8,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 14,
  }).addTo(leafletMap);

  // User location
  const userIcon = L.divIcon({ className: '', html: '<div class="wm-user"></div>', iconSize: [16,16], iconAnchor: [8,8] });
  userMarker = L.marker([userLat, userLon], { icon: userIcon, zIndexOffset: 1000 }).addTo(leafletMap);

  // Fetch on pan/zoom (debounced)
  leafletMap.on('moveend', () => {
    clearTimeout(movePending);
    movePending = setTimeout(() => updateMapForBounds(leafletMap.getBounds()), 350);
  });

  // Initial fetch
  updateMapForBounds(leafletMap.getBounds());
}

// ─── Error / loading ──────────────────────────────────────────────────────────
function showError(title, msg, btn = true) {
  document.getElementById('mainContent').innerHTML = `
    <div class="state">
      <div class="state-icon">🌬️</div>
      <div class="state-title">${title}</div>
      <div class="state-msg">${msg}</div>
      ${btn ? '<button class="state-btn" onclick="init()">Yritä uudelleen</button>' : ''}
    </div>`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  allData = null; windCache.clear(); activeMarkers.clear();
  leafletMap = null; mapHourIdx = null;

  document.getElementById('mainContent').innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <div class="state-title">Ladataan</div>
      <div class="state-msg">Haetaan sijaintiasi ja tuulitietoja...</div>
    </div>`;
  document.getElementById('locationName').textContent = 'Haetaan sijaintia...';

  if (!navigator.geolocation) {
    showError('Sijaintipalvelu ei käytössä', 'Selaimesi ei tue paikannusta.'); return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    try {
      const [wd, place] = await Promise.all([fetchWeather(userLat, userLon), reverseGeocode(userLat, userLon)]);
      document.getElementById('locationName').textContent = place;
      const h = wd.hourly;
      allData = {
        hourly: h.time.map((time, i) => ({
          time,
          windSpeed: h.wind_speed_10m[i],
          windDir:   h.wind_direction_10m[i],
          gusts:     h.wind_gusts_10m[i],
        }))
      };
      renderListView();
    } catch {
      showError('Tietojen haku epäonnistui', 'Tarkista internetyhteytesi ja yritä uudelleen.');
    }
  }, (err) => {
    if (err.code === 1) showError('Sijainti estetty', 'Salli paikannuslupa selaimessa nähdäksesi lähimmät tuulitiedot.');
    else showError('Sijaintia ei saatu', 'Paikannuksessa tapahtui virhe. Yritä uudelleen.');
  }, { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 });
}

document.getElementById('refreshBtn').onclick = init;
init();
</script>
